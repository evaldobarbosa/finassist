# Configuracao ngrok para FinAssistant (Docker)
# O authtoken eh passado via variavel de ambiente NGROK_AUTHTOKEN
# Nota: Hostnames customizados requerem plano pago

version: "3"

tunnels:
  frontend:
    proto: http
    addr: finassistant-frontend:5173

  api:
    proto: http
    addr: finassistant-api:8080
