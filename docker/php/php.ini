; Configuracoes customizadas para desenvolvimento

[PHP]
; Limites de memoria e execucao
memory_limit = 512M
max_execution_time = 300
max_input_time = 300

; Upload de arquivos
upload_max_filesize = 100M
post_max_size = 100M
max_file_uploads = 20

; Timezone
date.timezone = America/Sao_Paulo

; Erros (desenvolvimento)
display_errors = On
display_startup_errors = On
error_reporting = E_ALL
log_errors = On

; OPcache (desabilitado em dev para refletir mudancas imediatamente)
opcache.enable = 0
opcache.enable_cli = 0

; Sessao
session.cookie_httponly = 1
session.use_strict_mode = 1

; Realpath cache
realpath_cache_size = 4096K
realpath_cache_ttl = 600
