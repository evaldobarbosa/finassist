<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>FinAssistant - Nova Despesa</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "tertiary-container": "#e02928",
                        "surface-bright": "#f9f9ff",
                        "on-secondary-fixed-variant": "#004395",
                        "on-primary-container": "#f7fff2",
                        "surface": "#f9f9ff",
                        "secondary-fixed-dim": "#adc6ff",
                        "surface-container-highest": "#dce2f7",
                        "secondary": "#0058be",
                        "on-surface-variant": "#3e4a3d",
                        "inverse-primary": "#62df7d",
                        "error-container": "#ffdad6",
                        "on-error": "#ffffff",
                        "tertiary-fixed-dim": "#ffb4ab",
                        "surface-tint": "#006e2d",
                        "surface-container-lowest": "#ffffff",
                        "inverse-on-surface": "#edf0ff",
                        "secondary-container": "#2170e4",
                        "secondary-fixed": "#d8e2ff",
                        "surface-dim": "#d3daef",
                        "on-tertiary": "#ffffff",
                        "on-tertiary-container": "#fffbff",
                        "tertiary": "#bb0112",
                        "surface-container-high": "#e1e8fd",
                        "on-primary": "#ffffff",
                        "on-background": "#141b2b",
                        "primary": "#006b2c",
                        "on-secondary": "#ffffff",
                        "inverse-surface": "#293040",
                        "surface-container": "#e9edff",
                        "on-surface": "#141b2b",
                        "surface-variant": "#dce2f7",
                        "on-tertiary-fixed-variant": "#93000b",
                        "on-secondary-fixed": "#001a42",
                        "tertiary-fixed": "#ffdad6",
                        "on-primary-fixed": "#002109",
                        "on-secondary-container": "#fefcff",
                        "background": "#f9f9ff",
                        "on-primary-fixed-variant": "#005320",
                        "surface-container-low": "#f1f3ff",
                        "on-error-container": "#93000a",
                        "error": "#ba1a1a",
                        "primary-fixed": "#7ffc97",
                        "primary-container": "#00873a",
                        "primary-fixed-dim": "#62df7d",
                        "outline": "#6e7b6c",
                        "outline-variant": "#bdcaba",
                        "on-tertiary-fixed": "#410002"
                    },
                    fontFamily: {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        body { font-family: 'Inter', sans-serif; }
        .editorial-shadow { box-shadow: 0px 24px 48px -12px rgba(20, 27, 43, 0.08); }
    </style>
</head>
<body class="bg-surface text-on-surface antialiased overflow-hidden">
<!-- Mocked Background Dashboard (Blurred) -->
<div class="fixed inset-0 z-0 blur-xl scale-105 opacity-50 overflow-hidden select-none pointer-events-none">
<!-- Top Bar -->
<header class="bg-white/80 px-6 py-4 flex items-center justify-between">
<span class="text-xl font-bold tracking-tight text-slate-900">FinAssistant</span>
<div class="flex gap-4">
<div class="w-8 h-8 rounded-full bg-slate-200"></div>
<div class="w-8 h-8 rounded-full bg-slate-200"></div>
</div>
</header>
<!-- Main Content Bento Grid Mock -->
<main class="p-8 grid grid-cols-12 gap-6">
<div class="col-span-8 h-64 bg-white rounded-xl"></div>
<div class="col-span-4 h-64 bg-white rounded-xl"></div>
<div class="col-span-4 h-48 bg-white rounded-xl"></div>
<div class="col-span-4 h-48 bg-white rounded-xl"></div>
<div class="col-span-4 h-48 bg-white rounded-xl"></div>
</main>
</div>
<!-- Modal Overlay -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-on-background/10 backdrop-blur-sm">
<!-- Modal Container -->
<div class="bg-surface-container-lowest w-full max-w-lg rounded-xl overflow-hidden editorial-shadow flex flex-col">
<!-- Modal Header / Tabs -->
<div class="bg-surface-container-low p-1 mx-6 mt-6 rounded-xl flex items-center gap-1">
<button class="flex-1 py-2 text-sm font-semibold rounded-lg text-slate-500 hover:text-slate-900 transition-colors">
                    Receita
                </button>
<button class="flex-1 py-2 text-sm font-semibold rounded-lg bg-surface-container-lowest text-tertiary shadow-sm">
                    Despesa
                </button>
<button class="flex-1 py-2 text-sm font-semibold rounded-lg text-slate-500 hover:text-slate-900 transition-colors">
                    Transferência
                </button>
</div>
<!-- Form Body -->
<form class="p-8 space-y-6">
<!-- Large Value Input (Editorial Scale Contrast) -->
<div class="text-left">
<label class="block text-[0.6875rem] font-medium uppercase tracking-wider text-on-surface-variant mb-1">Valor da Despesa</label>
<div class="flex items-baseline gap-2">
<span class="text-2xl font-bold text-tertiary">R$</span>
<input class="w-full border-none p-0 text-5xl font-bold text-tertiary bg-transparent focus:ring-0 placeholder-tertiary/30" placeholder="0,00" type="text" value="0,00"/>
</div>
</div>
<!-- Fields Grid -->
<div class="grid grid-cols-2 gap-6">
<!-- Description -->
<div class="col-span-2">
<label class="block text-[0.6875rem] font-medium uppercase tracking-wider text-on-surface-variant mb-2">Descrição</label>
<div class="relative">
<input class="w-full h-11 px-4 bg-surface-container-highest border-none rounded-lg focus:bg-surface-container-lowest focus:ring-2 focus:ring-primary transition-all text-sm font-medium" placeholder="Ex: Jantar de negócios" type="text"/>
</div>
</div>
<!-- Date Picker -->
<div>
<label class="block text-[0.6875rem] font-medium uppercase tracking-wider text-on-surface-variant mb-2">Data</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-3 text-slate-400 text-lg">calendar_today</span>
<input class="w-full h-11 pl-10 pr-4 bg-surface-container-highest border-none rounded-lg focus:bg-surface-container-lowest focus:ring-2 focus:ring-primary transition-all text-sm font-medium" type="date"/>
</div>
</div>
<!-- Category Dropdown -->
<div>
<label class="block text-[0.6875rem] font-medium uppercase tracking-wider text-on-surface-variant mb-2">Categoria</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-3 text-slate-400 text-lg" data-icon="category">category</span>
<select class="w-full h-11 pl-10 pr-4 bg-surface-container-highest border-none rounded-lg focus:bg-surface-container-lowest focus:ring-2 focus:ring-primary transition-all text-sm font-medium appearance-none">
<option>Alimentação</option>
<option>Transporte</option>
<option>Lazer</option>
<option>Saúde</option>
</select>
<span class="material-symbols-outlined absolute right-3 text-slate-400 text-lg pointer-events-none">expand_more</span>
</div>
</div>
<!-- Account Dropdown -->
<div class="col-span-2">
<label class="block text-[0.6875rem] font-medium uppercase tracking-wider text-on-surface-variant mb-2">Conta / Carteira</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-3 text-slate-400 text-lg" data-icon="account_balance">account_balance</span>
<select class="w-full h-11 pl-10 pr-4 bg-surface-container-highest border-none rounded-lg focus:bg-surface-container-lowest focus:ring-2 focus:ring-primary transition-all text-sm font-medium appearance-none">
<option>Banco Principal</option>
<option>Carteira Digital</option>
<option>Dinheiro em Espécie</option>
</select>
<span class="material-symbols-outlined absolute right-3 text-slate-400 text-lg pointer-events-none">expand_more</span>
</div>
</div>
<!-- Observations -->
<div class="col-span-2">
<label class="block text-[0.6875rem] font-medium uppercase tracking-wider text-on-surface-variant mb-2">Observações</label>
<textarea class="w-full p-4 bg-surface-container-highest border-none rounded-lg focus:bg-surface-container-lowest focus:ring-2 focus:ring-primary transition-all text-sm font-medium resize-none" placeholder="Notas adicionais sobre esta transação..." rows="2"></textarea>
</div>
</div>
<!-- Actions -->
<div class="flex items-center gap-3 pt-2">
<button class="flex-1 h-12 text-sm font-bold text-on-surface-variant hover:bg-surface-container-high rounded-full transition-colors" type="button">
                        Cancelar
                    </button>
<button class="flex-[2] h-12 text-sm font-bold text-on-primary bg-gradient-to-br from-primary to-primary-container rounded-full shadow-lg active:scale-95 transition-all" type="submit">
                        Salvar Despesa
                    </button>
</div>
</form>
<!-- Bottom Indicator for Visual Weight -->
<div class="h-1.5 w-1/3 bg-surface-container-highest mx-auto mb-4 rounded-full"></div>
</div>
</div>
<!-- Hidden Navigation (Suppressed per task context of being a focused sub-page/modal) -->
<nav class="hidden">
<!-- Sidebar and Bottom Nav logic from JSON would go here if not suppressed -->
</nav>
</body></html>
