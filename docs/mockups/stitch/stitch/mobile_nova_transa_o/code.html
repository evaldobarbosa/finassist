<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>FinAssistant - New Transaction</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-low": "#f1f3ff",
              "on-secondary-container": "#fefcff",
              "on-error": "#ffffff",
              "on-error-container": "#93000a",
              "tertiary-fixed-dim": "#ffb4ab",
              "on-primary": "#ffffff",
              "inverse-on-surface": "#edf0ff",
              "surface-bright": "#f9f9ff",
              "error-container": "#ffdad6",
              "primary": "#006b2c",
              "on-tertiary-fixed": "#410002",
              "error": "#ba1a1a",
              "surface": "#f9f9ff",
              "on-surface": "#141b2b",
              "on-tertiary-fixed-variant": "#93000b",
              "on-primary-fixed": "#002109",
              "inverse-surface": "#293040",
              "on-background": "#141b2b",
              "on-surface-variant": "#3e4a3d",
              "on-secondary-fixed-variant": "#004395",
              "surface-variant": "#dce2f7",
              "on-tertiary": "#ffffff",
              "on-secondary-fixed": "#001a42",
              "secondary": "#0058be",
              "on-secondary": "#ffffff",
              "outline-variant": "#bdcaba",
              "on-primary-container": "#f7fff2",
              "surface-dim": "#d3daef",
              "surface-container-highest": "#dce2f7",
              "surface-container-high": "#e1e8fd",
              "secondary-fixed-dim": "#adc6ff",
              "surface-container": "#e9edff",
              "primary-container": "#00873a",
              "primary-fixed": "#7ffc97",
              "on-tertiary-container": "#fffbff",
              "outline": "#6e7b6c",
              "surface-container-lowest": "#ffffff",
              "primary-fixed-dim": "#62df7d",
              "tertiary": "#bb0112",
              "tertiary-container": "#e02928",
              "secondary-container": "#2170e4",
              "inverse-primary": "#62df7d",
              "tertiary-fixed": "#ffdad6",
              "background": "#f9f9ff",
              "surface-tint": "#006e2d",
              "secondary-fixed": "#d8e2ff",
              "on-primary-fixed-variant": "#005320"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Inter', sans-serif; }
        .glass-nav {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        input:focus { outline: none; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-container-low text-on-surface min-h-screen flex flex-col">
<!-- Top Bar (Suppressed Shell as per UX goal for transactional screen) -->
<header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-zinc-950/80 backdrop-blur-md flex items-center justify-between px-6 h-16 shadow-sm">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-zinc-100 transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-zinc-500" data-icon="close">close</span>
</button>
<h1 class="font-['Inter'] font-semibold text-lg tracking-tight text-zinc-900">New Transaction</h1>
<div class="w-10"></div> <!-- Spacer for center alignment -->
</header>
<!-- Main Content: The Modal/Sheet Canvas -->
<main class="flex-1 mt-16 pb-24 overflow-y-auto px-6">
<!-- Tab Selector: Editorial Design -->
<nav class="flex p-1 bg-surface-container-high rounded-xl mt-6 mb-8 gap-1">
<button class="flex-1 py-3 text-sm font-semibold rounded-lg bg-surface-container-lowest text-tertiary shadow-sm transition-all">
                Expense
            </button>
<button class="flex-1 py-3 text-sm font-semibold rounded-lg text-on-surface-variant hover:bg-surface-container-lowest/50 transition-all">
                Income
            </button>
<button class="flex-1 py-3 text-sm font-semibold rounded-lg text-on-surface-variant hover:bg-surface-container-lowest/50 transition-all">
                Transfer
            </button>
</nav>
<!-- Money Input: Display-LG Narrative Voice -->
<section class="mb-10 text-left">
<label class="font-['Inter'] text-[11px] font-medium uppercase tracking-wider text-zinc-400 mb-1 block">Amount</label>
<div class="flex items-baseline gap-2">
<span class="text-3xl font-bold text-tertiary">$</span>
<input autofocus="" class="w-full bg-transparent border-none p-0 text-[3.5rem] font-bold tracking-tighter text-on-surface placeholder:text-zinc-200 focus:ring-0" placeholder="0.00" type="number"/>
</div>
</section>
<!-- Form Fields: Tonal Layering -->
<div class="space-y-6">
<!-- Description -->
<div class="space-y-2">
<label class="text-sm font-semibold text-zinc-600 px-1">Description</label>
<div class="relative group">
<input class="w-full h-14 px-4 bg-surface-container-highest border-none rounded-xl text-on-surface placeholder:text-zinc-400 focus:bg-surface-container-lowest focus:ring-2 focus:ring-primary transition-all" placeholder="What was this for?" type="text"/>
<span class="material-symbols-outlined absolute right-4 top-4 text-zinc-400" data-icon="edit_note">edit_note</span>
</div>
</div>
<!-- Bento-style Grid for Date and Category -->
<div class="grid grid-cols-2 gap-4">
<!-- Date Selector -->
<div class="space-y-2">
<label class="text-sm font-semibold text-zinc-600 px-1">Date</label>
<div class="relative h-14 bg-surface-container-highest rounded-xl flex items-center px-4 hover:bg-surface-container-high transition-colors cursor-pointer">
<span class="material-symbols-outlined text-zinc-500 mr-2 text-xl" data-icon="calendar_today">calendar_today</span>
<span class="text-sm font-medium">Today</span>
<input class="absolute inset-0 opacity-0 cursor-pointer" type="date"/>
</div>
</div>
<!-- Category Selector -->
<div class="space-y-2">
<label class="text-sm font-semibold text-zinc-600 px-1">Category</label>
<button class="w-full h-14 bg-surface-container-highest rounded-xl flex items-center px-4 hover:bg-surface-container-high transition-colors text-left overflow-hidden">
<span class="material-symbols-outlined text-tertiary mr-2 text-xl" data-icon="fastfood">fastfood</span>
<span class="text-sm font-medium truncate">Dining Out</span>
</button>
</div>
</div>
<!-- Account Selection: Full Width Card -->
<div class="space-y-2">
<label class="text-sm font-semibold text-zinc-600 px-1">Source Account</label>
<button class="w-full h-16 bg-surface-container-lowest border-2 border-surface-container-high rounded-2xl flex items-center justify-between px-5 hover:border-primary/20 transition-all">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-secondary/10 flex items-center justify-center">
<span class="material-symbols-outlined text-secondary" data-icon="account_balance">account_balance</span>
</div>
<div class="text-left">
<p class="text-sm font-bold text-on-surface">Chase Checking</p>
<p class="text-[10px] uppercase font-bold text-zinc-400 tracking-widest">Balance: $12,450.00</p>
</div>
</div>
<span class="material-symbols-outlined text-zinc-400" data-icon="expand_more">expand_more</span>
</button>
</div>
<!-- Visual Feedback / Helper Note -->
<div class="bg-tertiary/5 p-4 rounded-xl flex gap-3 items-start">
<span class="material-symbols-outlined text-tertiary text-lg mt-0.5" data-icon="info">info</span>
<p class="text-xs text-tertiary/80 leading-relaxed font-medium">
                    This transaction will be deducted from your "Chase Checking" and categorized under "Dining Out".
                </p>
</div>
</div>
</main>
<!-- Fixed Action Footer: High Contrast Editorial Style -->
<footer class="fixed bottom-0 left-0 w-full p-6 bg-white/80 backdrop-blur-xl flex flex-col gap-3 shadow-[0_-4px_24px_-8px_rgba(20,27,43,0.08)]">
<button class="w-full h-14 bg-gradient-to-br from-primary to-primary-container text-on-primary font-bold text-base rounded-xl shadow-lg shadow-primary/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span>Create Transaction</span>
<span class="material-symbols-outlined" data-icon="check_circle" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</button>
<button class="w-full h-10 text-zinc-400 font-semibold text-sm hover:text-zinc-600 transition-colors">
            Cancel
        </button>
</footer>
<!-- Decorative Aesthetic Background Element -->
<div class="fixed -bottom-20 -left-20 w-64 h-64 bg-primary/5 rounded-full blur-3xl -z-10"></div>
<div class="fixed -top-20 -right-20 w-64 h-64 bg-secondary/5 rounded-full blur-3xl -z-10"></div>
</body></html>
