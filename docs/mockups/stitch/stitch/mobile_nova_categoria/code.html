<body class="bg-surface font-body text-on-surface antialiased">
<!-- Main Content Background (Simulated Dashboard) -->

<header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-zinc-950/80 backdrop-blur-md shadow-sm dark:shadow-none">
<div class="flex items-center justify-between px-6 h-16 w-full max-w-screen-xl mx-auto">
<div class="flex items-center gap-4">
<button class="p-2 hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-green-700 dark:text-green-500">menu</span>

<span class="text-xl font-bold tracking-tighter text-zinc-900 dark:text-zinc-50">FinAssistant</span>

<div class="w-8 h-8 rounded-full overflow-hidden bg-surface-container-high border border-outline-variant/15">

</div>
</div>
</header>
<!-- Background Content Placeholder -->
<div class="px-6 pt-24 space-y-8 opacity-40 grayscale pointer-events-none">
<div class="space-y-2">
<span class="text-[11px] font-medium uppercase tracking-wider text-zinc-500">Total Balance</span>
<h1 class="text-5xl font-bold tracking-tight text-on-surface">$12,450.00</h1>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="bg-surface-container-lowest p-6 rounded-xl shadow-sm">
<span class="material-symbols-outlined text-primary mb-2">arrow_upward</span>
<p class="text-[11px] font-medium uppercase text-zinc-500">Income</p>
<p class="text-xl font-bold">$4,200</p>
</div>
<div class="bg-surface-container-lowest p-6 rounded-xl shadow-sm">
<span class="material-symbols-outlined text-tertiary mb-2">arrow_downward</span>
<p class="text-[11px] font-medium uppercase text-zinc-500">Expenses</p>
<p class="text-xl font-bold">$1,850</p>
</div>
</div>
</div>
<!-- FAB (Suppressed as per rules on focus screens, but showing state) -->
</main>
<!-- Bottom Sheet Backdrop -->
<div class="fixed inset-0 bg-on-surface/40 backdrop-blur-[2px] z-[60] transition-opacity"></div>
<!-- Bottom Sheet Modal: Nova Categoria -->
<div class="fixed bottom-0 left-0 right-0 z-[70] bg-surface-container-lowest rounded-t-[2.5rem] shadow-[0_-12px_48px_-12px_rgba(20,27,43,0.15)] flex flex-col max-h-[813px]">
<!-- Handle -->
<div class="flex justify-center py-4">
<div class="w-12 h-1.5 bg-surface-container-highest rounded-full"></div>
</div>
<!-- Header -->
<div class="px-8 pb-4 flex items-center justify-between">
<h2 class="text-2xl font-bold tracking-tight text-on-surface">Nova Categoria</h2>
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-low text-on-surface-variant hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Form Content -->
<div class="px-8 pb-10 overflow-y-auto hide-scrollbar space-y-8">
<!-- Category Type Selector -->
<div class="space-y-3">
<label class="text-[11px] font-bold uppercase tracking-widest text-zinc-400 px-1">Tipo de Categoria</label>
<div class="flex p-1.5 bg-surface-container-low rounded-xl gap-1">
<button class="flex-1 py-3 px-4 rounded-lg bg-surface-container-lowest shadow-sm flex items-center justify-center gap-2 text-primary font-semibold transition-all">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">add_circle</span>
                        Receita
                    </button>
<button class="flex-1 py-3 px-4 rounded-lg flex items-center justify-center gap-2 text-on-surface-variant font-medium hover:bg-surface-container-high/50 transition-all">
<span class="material-symbols-outlined text-[20px]">remove_circle</span>
                        Despesa
                    </button>
</div>
</div>
<!-- Name Input -->
<div class="space-y-3">
<label class="text-[11px] font-bold uppercase tracking-widest text-zinc-400 px-1">Nome da Categoria</label>
<div class="relative">
<input class="w-full h-14 px-5 bg-surface-container-low border-none rounded-xl text-on-surface font-medium placeholder:text-zinc-400 focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all" placeholder="Ex: Lazer, Aluguel, Salário..." type="text"/>
</div>
</div>
<!-- Icon & Color Row -->
<div class="grid grid-cols-2 gap-6">
<!-- Icon Picker Trigger -->
<div class="space-y-3">
<label class="text-[11px] font-bold uppercase tracking-widest text-zinc-400 px-1">Ícone</label>
<button class="w-full h-16 flex items-center justify-center bg-surface-container-low rounded-xl hover:bg-surface-container-high transition-colors group">
<div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center text-primary group-active:scale-90 transition-transform">
<span class="material-symbols-outlined text-2xl">category</span>
</div>
</button>
</div>
<!-- Color Picker Trigger -->
<div class="space-y-3">
<label class="text-[11px] font-bold uppercase tracking-widest text-zinc-400 px-1">Cor</label>
<button class="w-full h-16 flex items-center justify-center bg-surface-container-low rounded-xl hover:bg-surface-container-high transition-colors group">
<div class="w-10 h-10 rounded-full bg-primary flex items-center justify-center text-on-primary group-active:scale-90 transition-transform shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-2xl">palette</span>
</div>
</button>
</div>
</div>
<!-- Monthly Limit Toggle -->
<div class="bg-surface-container-low p-5 rounded-2xl space-y-4">
<div class="flex items-center justify-between">
<div class="flex flex-col">
<span class="font-semibold text-on-surface">Limite Mensal</span>
<span class="text-xs text-on-surface-variant">Defina um teto de gastos</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-zinc-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</label>
</div>
<!-- Limit Input (Visible when toggle is on) -->
<div class="relative">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
<span class="text-zinc-500 font-semibold">R$</span>
</div>
<input class="w-full h-12 pl-12 pr-4 bg-surface-container-lowest border-none rounded-xl text-on-surface font-bold focus:ring-2 focus:ring-primary transition-all" type="number" value="500.00"/>
</div>
</div>
<!-- Action Buttons -->
<div class="flex gap-4 pt-4">
<button class="flex-1 h-14 bg-primary text-on-primary rounded-xl font-bold text-lg shadow-xl shadow-primary/20 active:scale-95 transition-all">
                    Criar Categoria
                </button>
</div>
</div>
</div>

<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 py-3 h-20 bg-white/80 dark:bg-zinc-950/80 backdrop-blur-xl z-[55] shadow-[0_-4px_24px_-8px_rgba(20,27,43,0.08)]">

<span class="material-symbols-outlined">dashboard</span>
<span class="font-['Inter'] text-[11px] font-medium uppercase tracking-wider mt-1">Dashboard</span>
</a>
<a class="flex flex-col items-center justify-center text-green-700 dark:text-green-400 font-bold bg-green-50 dark:bg-green-900/20 rounded-xl px-3 py-1" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">receipt_long</span>
<span class="font-['Inter'] text-[11px] font-medium uppercase tracking-wider mt-1">Transactions</span>

<span class="material-symbols-outlined">account_balance_wallet</span>
<span class="font-['Inter'] text-[11px] font-medium uppercase tracking-wider mt-1">Accounts</span>
</a>
<a class="flex flex-col items-center justify-center text-zinc-400 dark:text-zinc-500" href="#">
<span class="material-symbols-outlined">settings</span>
<span class="font-['Inter'] text-[11px] font-medium uppercase tracking-wider mt-1">Settings</span>
</a>
</nav>
