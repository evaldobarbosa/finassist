<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "secondary-fixed": "#d8e2ff",
              "on-error-container": "#93000a",
              "on-tertiary-fixed": "#410002",
              "tertiary-fixed": "#ffdad6",
              "on-surface": "#141b2b",
              "surface-bright": "#f9f9ff",
              "primary-fixed": "#7ffc97",
              "inverse-surface": "#293040",
              "on-primary-fixed": "#002109",
              "primary": "#006b2c",
              "on-secondary-fixed-variant": "#004395",
              "tertiary-fixed-dim": "#ffb4ab",
              "secondary-container": "#2170e4",
              "surface-container-high": "#e1e8fd",
              "secondary-fixed-dim": "#adc6ff",
              "primary-container": "#00873a",
              "on-primary-container": "#f7fff2",
              "tertiary": "#bb0112",
              "on-error": "#ffffff",
              "background": "#f9f9ff",
              "surface-dim": "#d3daef",
              "on-secondary": "#ffffff",
              "on-tertiary-container": "#fffbff",
              "on-background": "#141b2b",
              "surface-tint": "#006e2d",
              "inverse-on-surface": "#edf0ff",
              "on-tertiary": "#ffffff",
              "surface-container-lowest": "#ffffff",
              "error-container": "#ffdad6",
              "surface-variant": "#dce2f7",
              "surface-container-highest": "#dce2f7",
              "on-secondary-fixed": "#001a42",
              "surface": "#f9f9ff",
              "on-secondary-container": "#fefcff",
              "error": "#ba1a1a",
              "secondary": "#0058be",
              "surface-container-low": "#f1f3ff",
              "outline-variant": "#bdcaba",
              "outline": "#6e7b6c",
              "on-tertiary-fixed-variant": "#93000b",
              "on-surface-variant": "#3e4a3d",
              "on-primary": "#ffffff",
              "tertiary-container": "#e02928",
              "inverse-primary": "#62df7d",
              "primary-fixed-dim": "#62df7d",
              "surface-container": "#e9edff",
              "on-primary-fixed-variant": "#005320"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-surface-container-low min-h-screen flex items-center justify-center">
<!-- Overlay -->
<div class="fixed inset-0 bg-on-surface/50 backdrop-blur-sm z-[60]"></div>
<!-- SideNavBar (Hidden/Background Shell) -->
<aside class="w-[240px] h-screen fixed left-0 top-0 bg-white dark:bg-slate-900 flex flex-col py-6 space-y-2 border-r border-slate-100 dark:border-slate-800 font-sans text-[0.875rem] font-medium z-10 opacity-50 pointer-events-none">
<div class="px-6 mb-8">
<h1 class="text-lg font-bold text-green-700 dark:text-green-500">FinAssistant</h1>
<p class="text-[0.6875rem] text-slate-500">Editorial Ledger</p>
</div>
<nav class="flex-1 px-4 space-y-1">
<div class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-500">
<span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>
<span>Dashboard</span>
</div>
<div class="flex items-center gap-3 px-4 py-3 rounded-lg text-green-700 font-bold border-r-4 border-green-700 bg-slate-50">
<span class="material-symbols-outlined" data-icon="receipt_long">receipt_long</span>
<span>Transações</span>
</div>
</nav>
</aside>
<!-- Modal Container -->
<div class="relative z-[70] w-full max-w-[640px] mx-4">
<div class="bg-surface-container-lowest shadow-[0px_24px_48px_-12px_rgba(20,27,43,0.08)] rounded-xl overflow-hidden flex flex-col max-h-[921px]">
<!-- Modal Header -->
<header class="flex items-center justify-between px-8 py-6 bg-surface-container-lowest">
<div>
<h2 class="text-on-surface text-[1.75rem] font-semibold leading-tight">Adicionar Receitas Fixas</h2>
<p class="text-label-sm text-on-surface-variant mt-1 font-medium tracking-wide uppercase text-[0.6875rem]">Planejamento Financeiro Editorial</p>
</div>
<button class="p-2 hover:bg-surface-container-low rounded-full transition-colors text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</header>
<!-- Modal Body (Scrollable) -->
<div class="px-8 py-2 overflow-y-auto space-y-6">
<!-- Entry Card 1 -->
<div class="bg-surface-container-low p-6 rounded-xl space-y-4">
<div class="flex items-center justify-between mb-2">
<span class="bg-primary-fixed text-on-primary-fixed-variant px-3 py-1 rounded-full text-[0.6875rem] font-semibold">ITEM #01</span>
<button class="text-tertiary text-xs font-semibold hover:underline">Remover</button>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="flex flex-col space-y-1.5">
<label class="text-[0.6875rem] font-semibold text-on-surface-variant uppercase ml-1">Descrição</label>
<input class="w-full h-11 px-4 bg-surface-container-highest border-none rounded-lg focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all text-sm text-on-surface placeholder:text-outline" placeholder="Ex: Salário Mensal" type="text"/>
</div>
<div class="flex flex-col space-y-1.5">
<label class="text-[0.6875rem] font-semibold text-on-surface-variant uppercase ml-1">Valor</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-sm font-semibold text-on-surface-variant">R$</span>
<input class="w-full h-11 pl-11 pr-4 bg-surface-container-highest border-none rounded-lg focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all text-sm font-bold text-on-surface placeholder:text-outline" placeholder="0,00" type="number"/>
</div>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-3 gap-4">
<div class="flex flex-col space-y-1.5">
<label class="text-[0.6875rem] font-semibold text-on-surface-variant uppercase ml-1">Dia do Recebimento</label>
<input class="w-full h-11 px-4 bg-surface-container-highest border-none rounded-lg focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all text-sm text-on-surface placeholder:text-outline" max="31" min="1" placeholder="05" type="number"/>
</div>
<div class="flex flex-col space-y-1.5">
<label class="text-[0.6875rem] font-semibold text-on-surface-variant uppercase ml-1">Categoria</label>
<select class="w-full h-11 px-4 bg-surface-container-highest border-none rounded-lg focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all text-sm text-on-surface appearance-none">
<option>Salário</option>
<option>Investimentos</option>
<option>Freelance</option>
</select>
</div>
<div class="flex flex-col space-y-1.5">
<label class="text-[0.6875rem] font-semibold text-on-surface-variant uppercase ml-1">Conta</label>
<select class="w-full h-11 px-4 bg-surface-container-highest border-none rounded-lg focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all text-sm text-on-surface appearance-none">
<option>Banco Principal</option>
<option>Carteira</option>
<option>Reserva</option>
</select>
</div>
</div>
</div>
<!-- Entry Card 2 -->
<div class="bg-surface-container-low p-6 rounded-xl space-y-4">
<div class="flex items-center justify-between mb-2">
<span class="bg-primary-fixed text-on-primary-fixed-variant px-3 py-1 rounded-full text-[0.6875rem] font-semibold">ITEM #02</span>
<button class="text-tertiary text-xs font-semibold hover:underline">Remover</button>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="flex flex-col space-y-1.5">
<label class="text-[0.6875rem] font-semibold text-on-surface-variant uppercase ml-1">Descrição</label>
<input class="w-full h-11 px-4 bg-surface-container-highest border-none rounded-lg focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all text-sm text-on-surface placeholder:text-outline" placeholder="Ex: Aluguel Vaga Garagem" type="text"/>
</div>
<div class="flex flex-col space-y-1.5">
<label class="text-[0.6875rem] font-semibold text-on-surface-variant uppercase ml-1">Valor</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-sm font-semibold text-on-surface-variant">R$</span>
<input class="w-full h-11 pl-11 pr-4 bg-surface-container-highest border-none rounded-lg focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all text-sm font-bold text-on-surface placeholder:text-outline" placeholder="250,00" type="number"/>
</div>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-3 gap-4">
<div class="flex flex-col space-y-1.5">
<label class="text-[0.6875rem] font-semibold text-on-surface-variant uppercase ml-1">Dia do Recebimento</label>
<input class="w-full h-11 px-4 bg-surface-container-highest border-none rounded-lg focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all text-sm text-on-surface placeholder:text-outline" max="31" min="1" placeholder="10" type="number"/>
</div>
<div class="flex flex-col space-y-1.5">
<label class="text-[0.6875rem] font-semibold text-on-surface-variant uppercase ml-1">Categoria</label>
<select class="w-full h-11 px-4 bg-surface-container-highest border-none rounded-lg focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all text-sm text-on-surface appearance-none">
<option>Aluguel</option>
<option>Outros</option>
</select>
</div>
<div class="flex flex-col space-y-1.5">
<label class="text-[0.6875rem] font-semibold text-on-surface-variant uppercase ml-1">Conta</label>
<select class="w-full h-11 px-4 bg-surface-container-highest border-none rounded-lg focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all text-sm text-on-surface appearance-none">
<option>Banco Principal</option>
<option>Carteira Digital</option>
</select>
</div>
</div>
</div>
<!-- Add Button -->
<button class="w-full py-4 flex items-center justify-center gap-2 rounded-xl text-primary font-semibold hover:bg-surface-container-high transition-all border-2 border-dashed border-outline-variant/30 group">
<span class="material-symbols-outlined group-hover:scale-110 transition-transform" data-icon="add_circle">add_circle</span>
<span>Adicionar outra receita</span>
</button>
</div>
<!-- Modal Footer -->
<footer class="p-8 bg-surface-container-lowest flex items-center justify-end gap-4 mt-2">
<button class="px-6 py-3 text-on-surface font-semibold hover:bg-surface-container-low rounded-xl transition-all">
                    Cancelar
                </button>
<button class="px-8 py-3 bg-gradient-to-br from-primary to-primary-container text-on-primary font-bold rounded-xl shadow-lg shadow-primary/20 active:scale-95 transition-all">
                    Salvar receitas
                </button>
</footer>
</div>
<!-- Decorative Illustration Element -->
<div class="absolute -bottom-16 -right-16 w-32 h-32 bg-primary/10 rounded-full blur-3xl -z-10"></div>
<div class="absolute -top-16 -left-16 w-32 h-32 bg-secondary/10 rounded-full blur-3xl -z-10"></div>
</div>
</body></html>
