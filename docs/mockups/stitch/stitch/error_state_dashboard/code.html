</div>

<div class="absolute -top-4 -right-4 w-16 h-16 bg-surface-container-high rounded-xl -z-0 opacity-50"></div>
<div class="absolute -bottom-2 -left-6 w-12 h-12 bg-secondary/5 rounded-full -z-0"></div>
</div>
<!-- Content Group -->
<div class="space-y-4">
<div class="space-y-1">
<span class="text-[0.6875rem] font-medium font-['Inter'] uppercase tracking-[0.15em] text-tertiary">Erro de Conexão</span>

<button class="w-full md:w-auto px-8 py-3 text-primary font-semibold hover:bg-surface-container-low rounded-xl transition-colors">
                    Suporte técnico
                </button>
</div>
