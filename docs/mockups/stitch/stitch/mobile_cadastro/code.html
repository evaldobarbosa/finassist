<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-start p-6">
<div class="w-full max-w-md mx-auto flex flex-col gap-10 mt-8">
<header class="flex flex-col items-start gap-4">
<div class="flex items-center gap-2">
<div class="w-10 h-10 bg-primary rounded-xl flex items-center justify-center">
<span class="material-symbols-outlined text-on-primary" style="font-variation-settings: 'FILL' 1;">account_balance</span>
</div>
<span class="text-xl font-bold tracking-tighter text-zinc-900">FinAssistant</span>
</div>
<div class="flex flex-col gap-1">
<h1 class="text-[1.75rem] font-semibold tracking-tight text-on-surface">Criar conta</h1>
<p class="text-[0.875rem] text-on-surface-variant font-medium">Comece sua jornada editorial financeira hoje.</p>
</div>
</header>
<section class="flex flex-col gap-6 w-full">
<button class="w-full h-12 flex items-center justify-center gap-3 bg-surface-container-lowest rounded-xl shadow-[0px_2px_4px_rgba(20,27,43,0.04)] hover:bg-surface-container-low transition-colors duration-200">
<img alt="Google" class="w-5 h-5" data-alt="Official Google G logo in its original multi-color brand aesthetic on a clean white background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA0E0UEX9rqQnaJI0lFx_brIqh7BmbvZEaG34lCsRPyB3tvOtnTtkFLgG5jWO31J5uvsM7gBOZS-OOPt6yM2C5IA-tj85gm4q4gRULKpd7RFOqkjxS4jrZ1bbxs0cURiFe3Vn93yxV86ba586ckLRMoefZwHLlR_MTnBx_FBotZdG-zq_YyM3e5rG6LOeB7l-uFYXkrU1nHz5HOvi3XEhi6p-ZNGjTGrszimCB6Zo12_4lEp9lLPjuHnxKFHRWvzNI2U4p1biDRF3-B"/>
<span class="text-[0.875rem] font-semibold text-on-surface">Continuar com Google</span>
</button>
<div class="flex items-center gap-4 w-full">
<div class="h-[1px] flex-1 bg-surface-container-highest"></div>
<span class="text-[0.6875rem] font-medium uppercase tracking-wider text-outline">ou via e-mail</span>
<div class="h-[1px] flex-1 bg-surface-container-highest"></div>
</div>
<form class="flex flex-col gap-5">
<div class="flex flex-col gap-2">
<label class="text-[0.6875rem] font-semibold uppercase tracking-wider text-outline ml-1">Nome completo</label>
<input class="w-full h-11 bg-surface-container-highest border-none rounded-xl px-4 text-[0.875rem] focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all placeholder:text-outline-variant" placeholder="Ex: Roberto Silva" type="text"/>
</div>
<div class="flex flex-col gap-2">
<label class="text-[0.6875rem] font-semibold uppercase tracking-wider text-outline ml-1">E-mail</label>
<input class="w-full h-11 bg-surface-container-highest border-none rounded-xl px-4 text-[0.875rem] focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all placeholder:text-outline-variant" placeholder="roberto@exemplo.com" type="email"/>
</div>
<div class="flex flex-col gap-2">
<label class="text-[0.6875rem] font-semibold uppercase tracking-wider text-outline ml-1">Senha</label>
<div class="relative">
<input class="w-full h-11 bg-surface-container-highest border-none rounded-xl px-4 text-[0.875rem] focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all placeholder:text-outline-variant" placeholder="Mínimo 8 caracteres" type="password"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant cursor-pointer">visibility</span>
</div>
</div>
<div class="flex items-start gap-3 mt-2">
<div class="relative flex items-center">
<input class="w-5 h-5 rounded-lg border-2 border-outline-variant bg-surface-container-highest text-primary focus:ring-primary focus:ring-offset-background cursor-pointer" id="terms" type="checkbox"/>
</div>
<label class="text-[0.875rem] text-on-surface-variant leading-tight" for="terms">
                        Eu aceito os <span class="text-primary font-semibold hover:underline cursor-pointer">Termos de Uso</span> e a <span class="text-primary font-semibold hover:underline cursor-pointer">Política de Privacidade</span>.
                    </label>
</div>
<button class="w-full h-14 mt-4 bg-gradient-to-br from-primary to-primary-container text-on-primary font-bold text-lg rounded-xl shadow-[0px_8px_16px_rgba(0,107,44,0.15)] active:scale-[0.98] transition-all flex items-center justify-center">
                    Criar conta
                </button>
</form>
</section>
<footer class="flex flex-col items-center gap-8 mt-4">
<p class="text-[0.875rem] text-on-surface-variant">
                Já possui uma conta? <a class="text-primary font-bold hover:underline" href="#">Faça login</a>
</p>
<div class="w-full p-6 bg-surface-container-low rounded-[2rem] flex flex-col gap-4 relative overflow-hidden">
<div class="flex flex-col gap-1 relative z-10">
<span class="text-[0.6875rem] font-bold text-primary uppercase tracking-widest">Dica Editorial</span>
<h3 class="text-[1rem] font-bold text-on-surface">Comece com o básico</h3>
<p class="text-[0.875rem] text-on-surface-variant leading-relaxed">Personalize seu feed financeiro para visualizar apenas o que importa para seu crescimento.</p>
</div>
<div class="absolute -right-4 -bottom-4 opacity-10">
<span class="material-symbols-outlined text-[120px] text-primary" style="font-variation-settings: 'FILL' 1;">trending_up</span>
</div>
</div>
</footer>
</div>
<div class="fixed top-0 left-0 w-full h-1 bg-gradient-to-r from-primary via-secondary to-tertiary opacity-40"></div>
