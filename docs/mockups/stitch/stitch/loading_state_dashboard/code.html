<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>FinAssistant - Dashboard Loading</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .skeleton-shimmer {
            background: linear-gradient(90deg, 
                #f1f3ff 25%, 
                #e1e8fd 50%, 
                #f1f3ff 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite linear;
        }
        .dark .skeleton-shimmer {
            background: linear-gradient(90deg, 
                #1e293b 25%, 
                #334155 50%, 
                #1e293b 75%);
            background-size: 200% 100%;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-container-high": "#e1e8fd",
                        "on-tertiary-fixed-variant": "#93000b",
                        "on-primary-container": "#f7fff2",
                        "on-primary": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "surface-variant": "#dce2f7",
                        "secondary-fixed-dim": "#adc6ff",
                        "inverse-primary": "#62df7d",
                        "secondary-container": "#2170e4",
                        "on-error-container": "#93000a",
                        "inverse-surface": "#293040",
                        "on-secondary-fixed": "#001a42",
                        "on-secondary-container": "#fefcff",
                        "on-error": "#ffffff",
                        "on-surface": "#141b2b",
                        "error": "#ba1a1a",
                        "primary-container": "#00873a",
                        "inverse-on-surface": "#edf0ff",
                        "on-secondary": "#ffffff",
                        "secondary": "#0058be",
                        "primary-fixed": "#7ffc97",
                        "background": "#f9f9ff",
                        "secondary-fixed": "#d8e2ff",
                        "tertiary": "#bb0112",
                        "tertiary-container": "#e02928",
                        "on-secondary-fixed-variant": "#004395",
                        "error-container": "#ffdad6",
                        "on-tertiary-fixed": "#410002",
                        "on-primary-fixed-variant": "#005320",
                        "primary": "#006b2c",
                        "surface-container-lowest": "#ffffff",
                        "outline": "#6e7b6c",
                        "on-surface-variant": "#3e4a3d",
                        "outline-variant": "#bdcaba",
                        "surface-container-low": "#f1f3ff",
                        "surface-container-highest": "#dce2f7",
                        "on-background": "#141b2b",
                        "surface-dim": "#d3daef",
                        "tertiary-fixed-dim": "#ffb4ab",
                        "surface-tint": "#006e2d",
                        "surface": "#f9f9ff",
                        "surface-container": "#e9edff",
                        "primary-fixed-dim": "#62df7d",
                        "on-tertiary-container": "#fffbff"
                    },
                    fontFamily: {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="bg-background text-on-surface min-h-screen">
<!-- TopAppBar -->
<header class="bg-white/80 dark:bg-slate-950/80 backdrop-blur-md fixed top-0 w-full z-50 shadow-sm dark:shadow-none flex justify-between items-center px-6 h-16 w-full">
<div class="flex items-center gap-4">
<span class="text-xl font-bold text-green-800 dark:text-green-400 font-['Inter'] font-semibold tracking-tight">FinAssistant</span>
</div>
<!-- Desktop Nav -->
<nav class="hidden md:flex items-center space-x-8">
<a class="text-green-700 dark:text-green-400 font-bold transition-colors" href="#">Home</a>
<a class="text-slate-500 dark:text-slate-400 hover:bg-slate-100/50 dark:hover:bg-slate-800/50 transition-colors px-2 py-1 rounded-lg" href="#">Analysis</a>
<a class="text-slate-500 dark:text-slate-400 hover:bg-slate-100/50 dark:hover:bg-slate-800/50 transition-colors px-2 py-1 rounded-lg" href="#">Search</a>
</nav>
<div class="flex items-center gap-4">
<button class="p-2 rounded-full hover:bg-slate-100/50 dark:hover:bg-slate-800/50 active:scale-95 duration-200">
<span class="material-symbols-outlined text-slate-600 dark:text-slate-300">notifications</span>
</button>
<button class="p-2 rounded-full hover:bg-slate-100/50 dark:hover:bg-slate-800/50 active:scale-95 duration-200">
<span class="material-symbols-outlined text-slate-600 dark:text-slate-300">account_circle</span>
</button>
</div>
</header>
<main class="pt-24 pb-24 px-6 max-w-7xl mx-auto">
<!-- Dashboard Header Skeleton -->
<div class="mb-10">
<div class="h-10 w-64 skeleton-shimmer rounded-lg mb-3"></div>
<div class="h-4 w-48 skeleton-shimmer rounded-lg opacity-60"></div>
</div>
<!-- Summary Bento Grid Skeleton -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
<!-- Card 1 -->
<div class="bg-surface-container-lowest p-8 rounded-xl shadow-sm space-y-4">
<div class="flex justify-between items-start">
<div class="h-4 w-24 skeleton-shimmer rounded"></div>
<div class="w-10 h-10 skeleton-shimmer rounded-full"></div>
</div>
<div class="h-12 w-40 skeleton-shimmer rounded-lg"></div>
<div class="h-4 w-32 skeleton-shimmer rounded opacity-40"></div>
</div>
<!-- Card 2 -->
<div class="bg-surface-container-lowest p-8 rounded-xl shadow-sm space-y-4">
<div class="flex justify-between items-start">
<div class="h-4 w-24 skeleton-shimmer rounded"></div>
<div class="w-10 h-10 skeleton-shimmer rounded-full"></div>
</div>
<div class="h-12 w-36 skeleton-shimmer rounded-lg"></div>
<div class="h-4 w-28 skeleton-shimmer rounded opacity-40"></div>
</div>
<!-- Card 3 -->
<div class="bg-surface-container-lowest p-8 rounded-xl shadow-sm space-y-4">
<div class="flex justify-between items-start">
<div class="h-4 w-24 skeleton-shimmer rounded"></div>
<div class="w-10 h-10 skeleton-shimmer rounded-full"></div>
</div>
<div class="h-12 w-44 skeleton-shimmer rounded-lg"></div>
<div class="h-4 w-36 skeleton-shimmer rounded opacity-40"></div>
</div>
</div>
<!-- Main Content Area: Split Editorial Layout -->
<div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
<!-- Analysis Section (Editorial Left) -->
<div class="lg:col-span-2 space-y-8">
<div class="flex justify-between items-end mb-6">
<div>
<div class="h-7 w-48 skeleton-shimmer rounded mb-2"></div>
<div class="h-4 w-64 skeleton-shimmer rounded opacity-50"></div>
</div>
<div class="h-10 w-32 skeleton-shimmer rounded-xl"></div>
</div>
<!-- Main Chart Area Placeholder -->
<div class="bg-surface-container-lowest p-6 rounded-xl h-[400px] flex flex-col justify-between">
<div class="flex gap-4">
<div class="h-4 w-16 skeleton-shimmer rounded"></div>
<div class="h-4 w-16 skeleton-shimmer rounded"></div>
</div>
<div class="flex items-end justify-between h-64 gap-2 px-4">
<div class="w-full skeleton-shimmer rounded-t-lg" style="height: 40%"></div>
<div class="w-full skeleton-shimmer rounded-t-lg" style="height: 65%"></div>
<div class="w-full skeleton-shimmer rounded-t-lg" style="height: 45%"></div>
<div class="w-full skeleton-shimmer rounded-t-lg" style="height: 90%"></div>
<div class="w-full skeleton-shimmer rounded-t-lg" style="height: 30%"></div>
<div class="w-full skeleton-shimmer rounded-t-lg" style="height: 75%"></div>
<div class="w-full skeleton-shimmer rounded-t-lg" style="height: 55%"></div>
</div>
</div>
</div>
<!-- Transactions Section (Editorial Right) -->
<div class="space-y-6">
<div class="flex justify-between items-center mb-4">
<div class="h-6 w-40 skeleton-shimmer rounded"></div>
<div class="h-4 w-12 skeleton-shimmer rounded opacity-50"></div>
</div>
<div class="space-y-4">
<!-- Transaction Item 1 -->
<div class="flex items-center justify-between p-4 bg-surface-container-low rounded-xl">
<div class="flex items-center gap-4">
<div class="w-12 h-12 skeleton-shimmer rounded-xl"></div>
<div class="space-y-2">
<div class="h-4 w-32 skeleton-shimmer rounded"></div>
<div class="h-3 w-20 skeleton-shimmer rounded opacity-40"></div>
</div>
</div>
<div class="h-5 w-16 skeleton-shimmer rounded"></div>
</div>
<!-- Transaction Item 2 -->
<div class="flex items-center justify-between p-4 bg-surface-container-lowest rounded-xl">
<div class="flex items-center gap-4">
<div class="w-12 h-12 skeleton-shimmer rounded-xl"></div>
<div class="space-y-2">
<div class="h-4 w-28 skeleton-shimmer rounded"></div>
<div class="h-3 w-24 skeleton-shimmer rounded opacity-40"></div>
</div>
</div>
<div class="h-5 w-20 skeleton-shimmer rounded"></div>
</div>
<!-- Transaction Item 3 -->
<div class="flex items-center justify-between p-4 bg-surface-container-low rounded-xl">
<div class="flex items-center gap-4">
<div class="w-12 h-12 skeleton-shimmer rounded-xl"></div>
<div class="space-y-2">
<div class="h-4 w-36 skeleton-shimmer rounded"></div>
<div class="h-3 w-16 skeleton-shimmer rounded opacity-40"></div>
</div>
</div>
<div class="h-5 w-14 skeleton-shimmer rounded"></div>
</div>
<!-- Transaction Item 4 -->
<div class="flex items-center justify-between p-4 bg-surface-container-lowest rounded-xl">
<div class="flex items-center gap-4">
<div class="w-12 h-12 skeleton-shimmer rounded-xl"></div>
<div class="space-y-2">
<div class="h-4 w-32 skeleton-shimmer rounded"></div>
<div class="h-3 w-20 skeleton-shimmer rounded opacity-40"></div>
</div>
</div>
<div class="h-5 w-16 skeleton-shimmer rounded"></div>
</div>
<!-- Transaction Item 5 -->
<div class="flex items-center justify-between p-4 bg-surface-container-low rounded-xl">
<div class="flex items-center gap-4">
<div class="w-12 h-12 skeleton-shimmer rounded-xl"></div>
<div class="space-y-2">
<div class="h-4 w-24 skeleton-shimmer rounded"></div>
<div class="h-3 w-28 skeleton-shimmer rounded opacity-40"></div>
</div>
</div>
<div class="h-5 w-24 skeleton-shimmer rounded"></div>
</div>
</div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="md:hidden bg-white/80 dark:bg-slate-950/80 backdrop-blur-xl fixed bottom-0 w-full z-50 pb-safe shadow-[0_-1px_0_0_rgba(0,0,0,0.05)] dark:shadow-[0_-1px_0_0_rgba(255,255,255,0.05)] flex justify-around items-center h-20 px-4 w-full">
<div class="flex flex-col items-center justify-center bg-green-50 dark:bg-green-900/30 text-green-700 dark:text-green-400 rounded-xl px-3 py-1 active:opacity-80 transition-all">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">home</span>
<span class="text-[11px] font-medium font-['Inter'] uppercase tracking-wider">Home</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-3 py-1 hover:text-green-600 dark:hover:text-green-300 active:opacity-80 transition-all">
<span class="material-symbols-outlined">insights</span>
<span class="text-[11px] font-medium font-['Inter'] uppercase tracking-wider">Analysis</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-3 py-1 hover:text-green-600 dark:hover:text-green-300 active:opacity-80 transition-all">
<span class="material-symbols-outlined">search</span>
<span class="text-[11px] font-medium font-['Inter'] uppercase tracking-wider">Search</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-3 py-1 hover:text-green-600 dark:hover:text-green-300 active:opacity-80 transition-all">
<span class="material-symbols-outlined">person</span>
<span class="text-[11px] font-medium font-['Inter'] uppercase tracking-wider">Profile</span>
</div>
</nav>
</body></html>
